[rust]
enable = [
  "rs/allow-attribute",    # #[allow(...)] suppresses compiler warnings
  "rs/blank-around-items", # struct/enum/trait/impl without blank lines around it
  "rs/clone",              # .clone() call; verify it is necessary
  "rs/dbg",                # dbg!() macro left in code
  "rs/expect",             # .expect() call; propagate errors with ? instead
  "rs/panic",              # panic!() macro
  "rs/print",              # println!/print!/eprintln! macro left in code
  "rs/todo",               # todo!() macro left in code
  "rs/trailing-comma",     # multiline struct literal without trailing comma
  "rs/unimplemented",      # unimplemented!() macro
  "rs/unsafe-block",       # unsafe block requires manual safety audit
  "rs/unwrap",             # .unwrap() call; propagate errors with ? instead
]
disable = []
